<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MJS · 每日打卡</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand">MJS</span>
        <span class="brand-dot">·</span>
        <span class="brand-sub">每日打卡</span>
      </div>
      <div class="topbar-right">
        <select id="username"></select>
        <button class="btn-sm" id="addUserBtn">+ 添加</button>
      </div>
    </header>

    <div class="layout">
      <!-- Left: Check-in -->
      <main class="panel panel-checkin">
        <div class="date-row">
          <button class="btn-icon-sm" id="prevDay">‹</button>
          <span class="date-label" id="displayDate"></span>
          <button class="btn-icon-sm" id="nextDay">›</button>
          <button class="btn-today" id="todayBtn">今天</button>
        </div>

        <div class="task-progress">
          <span class="progress-text" id="progressText">0 / 4</span>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <div class="task-list" id="taskList"></div>
        <button class="btn-add-task" id="addTaskBtn">+ 添加任务</button>
      </main>

      <!-- Right: Overview -->
      <aside class="panel panel-overview">
        <h2 class="panel-title">全员周报</h2>
        <div class="overview-chart" id="overviewChart"></div>
      </aside>
    </div>
  </div>

  <!-- Dialogs -->
  <dialog id="addUserDialog">
    <form method="dialog">
      <h3>添加使用者</h3>
      <input type="text" id="newUserName" placeholder="名称" required>
      <div class="dialog-actions">
        <button value="cancel" class="btn-cancel">取消</button>
        <button value="ok" class="btn-primary">添加</button>
      </div>
    </form>
  </dialog>

  <dialog id="addTaskDialog">
    <form method="dialog">
      <h3>添加任务</h3>
      <input type="text" id="newTaskName" placeholder="例如：跑步" required>
      <div class="dialog-actions">
        <button value="cancel" class="btn-cancel">取消</button>
        <button value="ok" class="btn-primary">添加</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirmDialog">
    <form method="dialog">
      <h3 id="confirmTitle">确认</h3>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button value="cancel" class="btn-cancel">取消</button>
        <button value="ok" class="btn-danger">删除</button>
      </div>
    </form>
  </dialog>

  <script src="js/app.js"></script>
</body>
</html>
