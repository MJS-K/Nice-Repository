<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MJS - 鏃ュ父鎵撳崱</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1>MJS</h1>
      <p class="subtitle">姣忔棩鎵撳崱</p>
    </div>
    <div class="user-switcher">
      <label for="username">浣跨敤鑰咃細</label>
      <select id="username">
        <option value="鎴戣嚜宸?>鎴戣嚜宸?/option>
      </select>
      <button class="btn-icon" id="addUserBtn" title="娣诲姞浣跨敤鑰?>+</button>
    </div>
  </header>

  <main class="app-main">
    <section class="date-bar">
      <button class="btn-nav" id="prevDay">&larr;</button>
      <div class="current-date">
        <span id="displayDate"></span>
        <button class="btn-today" id="todayBtn">浠婂ぉ</button>
      </div>
      <button class="btn-nav" id="nextDay">&rarr;</button>
    </section>

    <section class="task-board">
      <div class="task-list" id="taskList">
        <!-- Tasks rendered here -->
      </div>
      <button class="btn-add-task" id="addTaskBtn">+ 娣诲姞浠诲姟</button>
    </section>

    <section class="stats-section">
      <h2>鏈懆缁熻</h2>
      <div class="stats-grid" id="statsGrid"></div>
    </section>
  </main>

  <!-- Add User Dialog -->
  <dialog id="addUserDialog">
    <form method="dialog">
      <h3>娣诲姞浣跨敤鑰?/h3>
      <input type="text" id="newUserName" placeholder="杈撳叆鍚嶇О" required>
      <div class="dialog-actions">
        <button value="cancel" class="btn-cancel">鍙栨秷</button>
        <button value="ok" class="btn-primary">娣诲姞</button>
      </div>
    </form>
  </dialog>

  <!-- Add Task Dialog -->
  <dialog id="addTaskDialog">
    <form method="dialog">
      <h3>娣诲姞鏂颁换鍔?/h3>
      <input type="text" id="newTaskName" placeholder="渚嬪锛氳窇姝? required>
      <select id="newTaskIcon">
        <option value="馃弮">馃弮 杩愬姩</option>
        <option value="馃挧">馃挧 鍠濇按</option>
        <option value="馃摑">馃摑 绗旇</option>
        <option value="馃摎">馃摎 瀛︿範</option>
        <option value="馃">馃 鍐ユ兂</option>
        <option value="馃">馃 楗</option>
        <option value="馃摉">馃摉 闃呰</option>
        <option value="鉁嶏笍">鉁嶏笍 鍐欎綔</option>
        <option value="馃幆">馃幆 鑷畾涔?/option>
      </select>
      <div class="dialog-actions">
        <button value="cancel" class="btn-cancel">鍙栨秷</button>
        <button value="ok" class="btn-primary">娣诲姞</button>
      </div>
    </form>
  </dialog>

  <!-- Confirm Dialog -->
  <dialog id="confirmDialog">
    <form method="dialog">
      <h3 id="confirmTitle">纭</h3>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button value="cancel" class="btn-cancel">鍙栨秷</button>
        <button value="ok" class="btn-danger">鍒犻櫎</button>
      </div>
    </form>
  </dialog>

  <script src="js/app.js"></script>
</body>
</html>
